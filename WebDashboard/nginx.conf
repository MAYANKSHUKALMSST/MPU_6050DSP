# ════════════════════════════════════════════════════════════════
# nginx reverse-proxy config for PredictivEdge dashboard
#
# Place at: /etc/nginx/sites-available/predictivEdge
# Enable:   sudo ln -s /etc/nginx/sites-available/predictivEdge \
#                       /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# What this does:
#   HTTP :80  → proxies  /          to Node :3000  (dashboard)
#   HTTP :80  → upgrades /ws        to WebSocket on Node :3000
#   TCP  :3001 stays handled directly by Node (no nginx needed)
# ════════════════════════════════════════════════════════════════

# Rate-limit for the upload endpoint (10 MB/s per IP)
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

server {
    listen 80;
    server_name 161.118.167.196;   # replace with your domain if you have one

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer"  always;

    # ── Increase upload body size for firmware binaries (max 2 MB) ──
    client_max_body_size 2M;

    # ── WebSocket upgrade ─────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS alive 1 hour
    }

    # ── Firmware upload (rate-limited) ────────────────────────────
    location /api/upload {
        limit_req zone=upload_limit burst=3 nodelay;
        proxy_pass       http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── All other HTTP traffic → Node ─────────────────────────────
    location / {
        proxy_pass       http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
